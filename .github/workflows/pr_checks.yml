name: PR checks

on:
    push:
        branches: [ "main", "develop" ]
    pull_request:

env:
    commonGradleFlags: --parallel --stacktrace --no-configuration-cache --no-daemon
    detektReportPath: ./composeApp/build/reports/detekt/detekt.xml
    reviewdogSetup: -f=checkstyle -name="detekt" -level=error -filter-mode=added

jobs:
    pr-checks:
        runs-on: ubuntu-latest
        permissions:
          contents: read
          pull-requests: write
          checks: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Reviewdog
              uses: reviewdog/action-setup@v1
              with:
                  reviewdog_version: latest

            - name: Setup JDK 17 for build
              uses: actions/setup-java@v3
              with:
                  java-version: '17'
                  distribution: 'temurin'
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Run detekt
              run: ./gradlew detekt $commonGradleFlags

            - name: Run Reviewdog for Detekt as Github Review
              env:
                  REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  reviewdog $reviewdogSetup -reporter=github-pr-review < $detektReportPath

            - name: Run Reviewdog for Detekt as Github CHECK
              env:
                  REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  reviewdog $reviewdogSetup -reporter=github-pr-check < $detektReportPath

    build-android-debug-apk:
        runs-on: ubuntu-latest
        needs: pr-checks

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup JDK 17 for build
              uses: actions/setup-java@v3
              with:
                  java-version: '17'
                  distribution: 'temurin'
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build Android debug APK
              run: ./gradlew :composeApp:assembleDebug --stacktrace --no-daemon

            - name: Upload debug APK
              uses: actions/upload-artifact@v4
              with:
                  name: composeApp-debug-apk
                  path: composeApp/build/outputs/apk/debug/*.apk