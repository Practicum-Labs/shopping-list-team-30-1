name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > shoppinglist-release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          STORE_FILE=shoppinglist-release.jks
          STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew :shared:assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-release
          path: shared/build/outputs/apk/release/*.apk

      - name: Build release AAB
        run: ./gradlew :shared:bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: shoppinglist-release-aab-${{ github.sha }}
          path: shared/build/outputs/bundle/release/*.aab